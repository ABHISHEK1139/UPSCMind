# ═══════════════════════════════════════════════════════════════
# Hermes V2 — Production Docker Compose
# ═══════════════════════════════════════════════════════════════
# Features:
#   - Auto-restart on crash (restart: always)
#   - Health checks with auto-recovery
#   - Resource limits (CPU/RAM)
#   - GPU support (NVIDIA RTX 3050)
#   - Easy API key management via .env
#   - Persistent data volumes
#   - Log rotation
#   - Network isolation
# ═══════════════════════════════════════════════════════════════

services:
  # ── API GATEWAY ────────────────────────────────────────────────
  traefik:
    image: traefik:v2.10
    container_name: hermes_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--ping=true"
      - "--metrics.prometheus=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend_net
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── POSTGRESQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-upsc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-upsc_password}
      POSTGRES_DB: ${DB_NAME:-upsc_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/postgres:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-upsc_user} -d ${DB_NAME:-upsc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── QDRANT (Vector DB) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hermes_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
      - ./databases/qdrant:/qdrant/storage
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── NEO4J (Graph DB) ──────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: hermes_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-upsc_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - ./databases/neo4j:/data
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── REDIS (Cache + Broker) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 100
      --save 300 10
      --save 900 1
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --protected-mode no
    volumes:
      - redis_data:/data
      - ./databases/redis:/data
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── MINIO (Object Storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hermes_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-hermes_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-hermes_secret_2026}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./databases/minio:/data
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── FASTAPI BACKEND ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    ports:
      - "8000:8000"
    environment:
      # ── API Keys (change in .env file) ──
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      # ── Database ──
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-upsc_user}:${DB_PASSWORD:-upsc_password}@postgres:5432/${DB_NAME:-upsc_db}
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-upsc_neo4j_password}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-hermes_admin}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-hermes_secret_2026}
      # ── Workers ──
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # ── GPU ──
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      # ── App ──
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - frontend_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      - ./backend:/app
      - hermes_data:/app/data
      - hermes_training:/app/dataset/training_data
      - ./logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── CELERY WORKER ──────────────────────────────────────────────
  celery_worker:
    image: hermes_v2-backend
    container_name: hermes_celery_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=100
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-upsc_user}:${DB_PASSWORD:-upsc_password}@postgres:5432/${DB_NAME:-upsc_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── CELERY BEAT ────────────────────────────────────────────────
  celery_beat:
    image: hermes_v2-backend
    container_name: hermes_celery_beat
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── HEALTH MONITOR ─────────────────────────────────────────────
  health_monitor:
    image: alpine:latest
    container_name: hermes_health_monitor
    command: >
      sh -c "
      apk add --no-cache curl bash
      while true; do
        for svc in hermes_backend hermes_redis hermes_postgres hermes_qdrant hermes_neo4j; do
          status=$$(docker inspect --format='{{.State.Status}}' $$svc 2>/dev/null)
          if [ '$$status' != 'running' ]; then
            echo \"[ALERT] $$svc is $$status! Restarting...\"
            docker restart $$svc 2>/dev/null
          fi
        done
        sleep 60
      done
      "
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ── FRONTEND ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermes_frontend
    environment:
      - VITE_API_URL=/api
    networks:
      - frontend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── NETWORKS ─────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
    internal: false
  backend_net:
    driver: bridge
    internal: true

# ── VOLUMES ──────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  hermes_data:
    driver: local
  hermes_training:
    driver: local
