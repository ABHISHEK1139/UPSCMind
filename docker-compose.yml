services:
  # ═══════════════════════════════════════════════════════════════
  # EDGE LAYER — API Gateway & Routing
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.10
    container_name: hermes_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"    # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend_net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # MEMORY LAYER — Persistent State Databases
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: upsc_user
      POSTGRES_PASSWORD: upsc_password
      POSTGRES_DB: upsc_db
    volumes:
      - ./databases/postgres:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upsc_user -d upsc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hermes_qdrant
    volumes:
      - ./databases/qdrant:/qdrant/storage
    networks:
      - backend_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  neo4j:
    image: neo4j:5
    container_name: hermes_neo4j
    environment:
      NEO4J_AUTH: neo4j/upsc_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./databases/neo4j:/data
    networks:
      - backend_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 100
      --save 300 10
      --save 900 1
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./databases/redis:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # OBJECT STORAGE — Datasets, Logs, Exports
  # ═══════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: hermes_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermes_admin
      MINIO_ROOT_PASSWORD: hermes_secret_2026
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    volumes:
      - ./databases/minio:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # COGNITION LAYER — FastAPI Backend
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://upsc_user:upsc_password@postgres:5432/upsc_db
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=upsc_neo4j_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=hermes_admin
      - MINIO_SECRET_KEY=hermes_secret_2026
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - frontend_net
      - backend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      - ./backend:/app
      - hermes_data:/app/data
      - hermes_training:/app/dataset/training_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # GPU support for NVIDIA RTX 3050
    gpus: all
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  # ═══════════════════════════════════════════════════════════════
  # WORKER LAYER — Background Tasks (Celery)
  # ═══════════════════════════════════════════════════════════════
  celery_worker:
    image: hermes_v2-backend
    container_name: hermes_celery_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - DATABASE_URL=postgresql+asyncpg://upsc_user:upsc_password@postgres:5432/upsc_db
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=upsc_neo4j_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=hermes_admin
      - MINIO_SECRET_KEY=hermes_secret_2026
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  celery_beat:
    image: hermes_v2-backend
    container_name: hermes_celery_beat
    command: celery -A workers.celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND LAYER — React + Vite
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermes_frontend
    environment:
      - VITE_API_URL=/api
    networks:
      - frontend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ── Persistent Volumes ─────────────────────────────────────────────
volumes:
  hermes_data:
    driver: local
  hermes_training:
    driver: local
