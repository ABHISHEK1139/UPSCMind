name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d backend postgres redis qdrant neo4j
          sleep 30

      - name: Run tests
        run: |
          docker exec hermes_backend python3 -m pytest tests/ -v --tb=short

      - name: Upload coverage
        if: success()
        run: |
          docker exec hermes_backend python3 -m pytest tests/ --cov=backend --cov-report=xml
          cp backend/coverage.xml ./coverage.xml

      - name: Cleanup
        if: always()
        run: docker compose down -v
